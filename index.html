<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANTAWEAR | Modern Men's Essential</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;700&display=swap"
        rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="icon" type="image/png" href="assets/icons/Untitled design.png">
</head>

<body>
    <nav>
        <div class="logo bebas-font">
            <a href="index.html">
                <img src="assets/icons/Untitled_design-removebg-preview.png" alt="VANTAWEAR LOGO">
                VANTAWEAR
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="pages/shop.html">Shop</a></li>
        </ul>
        <div class="cart-icon" id="cart-btn">
            CART (<span id="cart-count">0</span>)
        </div>
    </nav>

    <header class="hero">
        <h1>WEAR THE DARK. <br> OWN THE POWER.</h1>
        <p>Built in black. Designed for modern strength and simplicity.</p>
        <a href="pages/shop.html" class="cta-button">Shop Collection</a>
    </header>

    <section class="section">
        <div class="section-header">
            <h2 class="bebas-font">New Arrivals</h2>
            <a href="pages/shop.html" style="color: white; text-transform: uppercase; font-size: small;">View All</a>
        </div>
        <div class="grid">
            <!-- Product Card 1 -->
            <div class="product-card"
                onclick="selectProduct({id: 'black-tech-tee', name: 'Black Tech Tee', price: '2500 DZD', image: 'assets/images/black tech tee.jpg', hasSizes: true, description: 'Engineered for performance and style. Featuring moisture-wicking technology and a tailored athletic fit.'})">
                <div class="product-img">
                    <img src="assets/images/black tech tee.jpg" alt="Black Tech Tee" loading="lazy">
                </div>
                <div class="product-info">
                    <h3 class="bebas-font">Black Tech Tee</h3>
                    <p class="price">2500 DZD</p>
                </div>
            </div>
            <!-- Product Card 2 -->
            <div class="product-card"
                onclick="selectProduct({id: 'slate-hoodie', name: 'Slate Hoodie', price: '4900 DZD', image: 'assets/images/slate hoodie.jpg', hasSizes: true, description: 'Premium heavyweight fleece hoodie with a minimalist aesthetic and relaxed fit.'})">
                <div class="product-img">
                    <img src="assets/images/slate hoodie.jpg" alt="Minimalist Hoodie" loading="lazy">
                </div>
                <div class="product-info">
                    <h3 class="bebas-font">Slate Hoodie</h3>
                    <p class="price">4900 DZD</p>
                </div>
            </div>
            <!-- Product Card 3 -->
            <div class="product-card"
                onclick="selectProduct({id: 'ribbed-knit-polo', name: 'Ribbed Knit Polo Shirt', price: '5500 DZD', image: 'assets/images/Ribbed Knit Polo Shirt.jpg', hasSizes: true, description: 'Premium ribbed knit polo shirt with a slim fit and breathable fabric, perfect for smart-casual wear.'})">
                <div class="product-img">
                    <img src="assets/images/Ribbed Knit Polo Shirt.jpg" alt="Ribbed Knit Polo Shirt" loading="lazy">
                </div>
                <div class="product-info">
                    <h3 class="bebas-font">Ribbed Knit Polo Shirt</h3>
                    <p class="price">5500 DZD</p>
                </div>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
</body>

</html>
